<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Cattle panel hoop house greenhouse illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="poly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e0f2f1" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- Distant treeline -->
  <ellipse cx="80" cy="390" rx="60" ry="50" fill="#4caf50" opacity="0.6"/>
  <ellipse cx="130" cy="375" rx="55" ry="60" fill="#388e3c" opacity="0.7"/>
  <ellipse cx="1070" cy="385" rx="55" ry="55" fill="#4caf50" opacity="0.6"/>
  <ellipse cx="1120" cy="370" rx="60" ry="65" fill="#388e3c" opacity="0.7"/>
  <ellipse cx="1160" cy="380" rx="50" ry="50" fill="#43a047" opacity="0.6"/>

  <!-- Ground plane -->
  <rect x="0" y="440" width="1200" height="190" fill="url(#grass)"/>
  <rect x="0" y="490" width="1200" height="140" fill="url(#ground)"/>

  <!-- Path/walkway in front -->
  <path d="M520 630 L560 490 L640 490 L680 630 Z" fill="#a1887f" opacity="0.5"/>

  <!-- === HOOP HOUSE === -->
  <!-- Poly film covering — main arch shape -->
  <path d="M220 460 Q400 200 600 185 Q800 200 980 460 Z" fill="url(#poly)" stroke="#b2dfdb" stroke-width="2" filter="url(#shadow)"/>

  <!-- Structural ribs (cattle panels) visible through poly -->
  <path d="M270 460 Q400 220 600 205 Q800 220 930 460" fill="none" stroke="#90a4ae" stroke-width="3" stroke-dasharray="6,4" opacity="0.5"/>
  <path d="M310 460 Q420 230 600 215 Q780 230 890 460" fill="none" stroke="#90a4ae" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.4"/>
  <path d="M360 460 Q440 245 600 228 Q760 245 840 460" fill="none" stroke="#90a4ae" stroke-width="2" stroke-dasharray="6,4" opacity="0.35"/>
  <path d="M415 460 Q470 258 600 243 Q730 258 785 460" fill="none" stroke="#90a4ae" stroke-width="2" stroke-dasharray="6,4" opacity="0.3"/>
  <path d="M470 460 Q505 272 600 258 Q695 272 730 460" fill="none" stroke="#90a4ae" stroke-width="2" stroke-dasharray="6,4" opacity="0.25"/>

  <!-- Outline/edge of poly -->
  <path d="M220 460 Q400 200 600 185 Q800 200 980 460" fill="none" stroke="#80cbc4" stroke-width="3"/>

  <!-- End wall (front face) — framed with 2x4 -->
  <path d="M220 460 L980 460 L980 460 Q980 460 600 185 Z" fill="none"/>
  <!-- Front end wall solid face -->
  <ellipse cx="600" cy="340" rx="380" ry="120" fill="#e0f7fa" opacity="0.3"/>

  <!-- Door frame -->
  <rect x="545" y="350" width="110" height="110" rx="4" fill="#b2dfdb" opacity="0.6" stroke="#4db6ac" stroke-width="3"/>
  <!-- Door panels -->
  <rect x="551" y="356" width="46" height="98" rx="2" fill="#e0f2f1" opacity="0.7" stroke="#80cbc4" stroke-width="1.5"/>
  <rect x="603" y="356" width="46" height="98" rx="2" fill="#e0f2f1" opacity="0.7" stroke="#80cbc4" stroke-width="1.5"/>
  <!-- Door handles -->
  <circle cx="598" cy="408" r="4" fill="#4db6ac"/>
  <circle cx="602" cy="408" r="4" fill="#4db6ac"/>

  <!-- T-post stakes along base -->
  <line x1="220" y1="460" x2="215" y2="510" stroke="#607d8b" stroke-width="4"/>
  <line x1="310" y1="460" x2="305" y2="510" stroke="#607d8b" stroke-width="4"/>
  <line x1="415" y1="460" x2="412" y2="510" stroke="#607d8b" stroke-width="4"/>
  <line x1="980" y1="460" x2="985" y2="510" stroke="#607d8b" stroke-width="4"/>
  <line x1="890" y1="460" x2="893" y2="510" stroke="#607d8b" stroke-width="4"/>
  <line x1="785" y1="460" x2="788" y2="510" stroke="#607d8b" stroke-width="4"/>

  <!-- Vent roll-up on side (indicated by a lighter band) -->
  <path d="M220 460 Q310 430 415 420 Q470 416 530 415" fill="none" stroke="#4db6ac" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <text x="240" y="412" font-family="sans-serif" font-size="14" fill="#00695c" opacity="0.8">roll-up vent</text>

  <!-- Inside plants silhouette (visible through poly) -->
  <ellipse cx="380" cy="420" rx="30" ry="28" fill="#388e3c" opacity="0.2"/>
  <ellipse cx="450" cy="415" rx="35" ry="32" fill="#2e7d32" opacity="0.18"/>
  <ellipse cx="530" cy="410" rx="40" ry="35" fill="#388e3c" opacity="0.16"/>
  <ellipse cx="670" cy="410" rx="40" ry="35" fill="#388e3c" opacity="0.16"/>
  <ellipse cx="750" cy="415" rx="35" ry="32" fill="#2e7d32" opacity="0.18"/>
  <ellipse cx="820" cy="420" rx="30" ry="28" fill="#388e3c" opacity="0.2"/>

  <!-- Sun -->
  <circle cx="1080" cy="80" r="48" fill="#fff9c4" opacity="0.9"/>
  <circle cx="1080" cy="80" r="36" fill="#fff176"/>
  <!-- Sun rays -->
  <g stroke="#ffee58" stroke-width="2.5" opacity="0.7">
    <line x1="1080" y1="20" x2="1080" y2="8"/>
    <line x1="1080" y1="140" x2="1080" y2="152"/>
    <line x1="1020" y1="80" x2="1008" y2="80"/>
    <line x1="1140" y1="80" x2="1152" y2="80"/>
    <line x1="1037" y1="37" x2="1028" y2="28"/>
    <line x1="1123" y1="123" x2="1132" y2="132"/>
    <line x1="1123" y1="37" x2="1132" y2="28"/>
    <line x1="1037" y1="123" x2="1028" y2="132"/>
  </g>

  <!-- Label -->
  <rect x="30" y="30" width="310" height="64" rx="8" fill="#00695c" opacity="0.85"/>
  <text x="52" y="58" font-family="'Outfit', sans-serif" font-size="18" font-weight="600" fill="#ffffff">Cattle Panel Hoop House</text>
  <text x="52" y="80" font-family="'Outfit', sans-serif" font-size="14" fill="#b2dfdb">12 × 24 ft · 6-mil greenhouse poly</text>
</svg>
