<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Gravity-fed water system diagram showing spring collection box, elevated tank, and cabin distribution">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#e1f5fe"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
    <linearGradient id="tank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90caf9"/>
      <stop offset="60%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0288d1"/>
    </marker>
    <filter id="sh2"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000030"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky2)"/>

  <!-- Hillside slope -->
  <path d="M0 630 L0 320 Q200 200 500 260 Q700 300 1200 400 L1200 630 Z" fill="#5d8a3c"/>
  <path d="M0 340 Q200 220 500 275 Q700 315 1200 415" fill="none" stroke="#388e3c" stroke-width="3"/>

  <!-- Ground texture -->
  <path d="M0 630 L0 360 Q150 340 300 350 Q450 360 600 370 Q800 385 1000 400 Q1100 410 1200 420 L1200 630 Z" fill="#4a7a2e"/>

  <!-- === SPRING COLLECTION BOX (top left of hill) === -->
  <g transform="translate(80, 175)">
    <!-- Spring water emerging from hillside -->
    <path d="M-30 35 Q-10 25 10 30" fill="none" stroke="#4fc3f7" stroke-width="3" stroke-dasharray="4,3"/>
    <path d="M-30 45 Q-10 38 10 40" fill="none" stroke="#4fc3f7" stroke-width="3" stroke-dasharray="4,3"/>
    <!-- Collection box -->
    <rect x="10" y="20" width="70" height="50" rx="4" fill="#546e7a" stroke="#37474f" stroke-width="2" filter="url(#sh2)"/>
    <rect x="10" y="20" width="70" height="15" rx="4" fill="#455a64"/>
    <!-- Water level inside -->
    <rect x="12" y="42" width="66" height="26" rx="2" fill="url(#water)" opacity="0.8"/>
    <!-- Screen mesh suggestion -->
    <line x1="10" y1="30" x2="80" y2="30" stroke="#263238" stroke-width="1" opacity="0.5"/>
    <!-- Label -->
    <rect x="-5" y="-28" width="130" height="22" rx="4" fill="#01579b" opacity="0.9"/>
    <text x="60" y="-12" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Spring Collection Box</text>
    <!-- Outlet pipe -->
    <rect x="80" y="52" width="30" height="8" rx="2" fill="#78909c"/>
  </g>

  <!-- Feed pipe from spring to tank (gravity fill) -->
  <path d="M190 228 Q280 235 360 258" fill="none" stroke="#78909c" stroke-width="8" stroke-linecap="round"/>
  <path d="M190 228 Q280 235 360 258" fill="none" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- Flow arrow -->
  <text x="270" y="222" font-family="sans-serif" font-size="11" fill="#0277bd" text-anchor="middle">gravity fill · 15 ft drop</text>

  <!-- === TANK STAND === -->
  <g transform="translate(360, 185)">
    <!-- Stand posts -->
    <rect x="5" y="80" width="10" height="95" fill="#5d4037"/>
    <rect x="95" y="80" width="10" height="95" fill="#5d4037"/>
    <rect x="25" y="100" width="10" height="75" fill="#5d4037"/>
    <rect x="75" y="100" width="10" height="75" fill="#5d4037"/>
    <!-- Cross-braces -->
    <line x1="5" y1="100" x2="105" y2="150" stroke="#6d4c41" stroke-width="5"/>
    <line x1="5" y1="150" x2="105" y2="100" stroke="#6d4c41" stroke-width="5"/>
    <!-- Top beam -->
    <rect x="0" y="72" width="110" height="12" rx="3" fill="#4e342e"/>

    <!-- 500-gal HDPE Tank -->
    <ellipse cx="55" cy="72" rx="55" ry="14" fill="#1565c0" opacity="0.7"/>
    <rect x="0" y="8" width="110" height="64" rx="6" fill="url(#tank)" filter="url(#sh2)"/>
    <ellipse cx="55" cy="8" rx="55" ry="14" fill="#90caf9"/>
    <!-- Water fill line -->
    <rect x="2" y="28" width="106" height="42" rx="4" fill="#1e88e5" opacity="0.5"/>
    <!-- Tank label -->
    <text x="55" y="42" font-family="sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle">500 gal</text>
    <text x="55" y="57" font-family="sans-serif" font-size="11" fill="#bbdefb" text-anchor="middle">HDPE Tank</text>
    <!-- Float valve indicator -->
    <circle cx="90" cy="14" r="6" fill="#ffb300"/>
    <text x="100" y="5" font-family="sans-serif" font-size="10" fill="#e65100">float valve</text>

    <!-- Elevation arrow -->
    <line x1="-30" y1="175" x2="-30" y2="72" stroke="#0288d1" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="-30" y1="175" x2="-30" y2="280" stroke="#0288d1" stroke-width="2"/>
    <text x="-50" y="230" font-family="sans-serif" font-size="12" fill="#01579b" text-anchor="middle" transform="rotate(-90,-50,230)">28 ft elevation</text>
  </g>

  <!-- Outlet pipe from tank down to cabin -->
  <path d="M470 348 Q550 360 650 370 Q800 385 920 395 Q980 400 1030 405" fill="none" stroke="#78909c" stroke-width="10" stroke-linecap="round"/>
  <path d="M470 348 Q550 360 650 370 Q800 385 920 395 Q980 400 1030 405" fill="none" stroke="#4fc3f7" stroke-width="5" stroke-linecap="round" opacity="0.7" marker-end="url(#arrow)"/>

  <!-- Distance label -->
  <text x="700" y="360" font-family="sans-serif" font-size="12" fill="#01579b" text-anchor="middle">150 ft run · 3/4″ poly pipe</text>

  <!-- Sediment filter inline -->
  <g transform="translate(770, 362)">
    <rect x="-15" y="-18" width="30" height="36" rx="6" fill="#546e7a" stroke="#37474f" stroke-width="2"/>
    <text x="0" y="28" font-family="sans-serif" font-size="10" fill="#546e7a" text-anchor="middle">20-micron</text>
    <text x="0" y="40" font-family="sans-serif" font-size="10" fill="#546e7a" text-anchor="middle">filter</text>
  </g>

  <!-- === CABIN === -->
  <g transform="translate(1000, 350)">
    <!-- Cabin body -->
    <rect x="0" y="40" width="160" height="100" fill="#8d6e63" filter="url(#sh2)"/>
    <!-- Roof -->
    <polygon points="−10,40 80,−10 170,40" fill="#5d4037"/>
    <polygon points="-10,40 80,-10 170,40" fill="#4e342e"/>
    <!-- Window -->
    <rect x="15" y="55" width="35" height="30" rx="2" fill="#b3e5fc" stroke="#546e7a" stroke-width="2"/>
    <line x1="32" y1="55" x2="32" y2="85" stroke="#546e7a" stroke-width="1"/>
    <line x1="15" y1="70" x2="50" y2="70" stroke="#546e7a" stroke-width="1"/>
    <!-- Door -->
    <rect x="110" y="80" width="35" height="60" rx="2" fill="#6d4c41" stroke="#4e342e" stroke-width="2"/>
    <circle cx="115" cy="112" r="3" fill="#ffb300"/>
    <!-- Faucet/pipe entry -->
    <rect x="-12" y="85" width="15" height="6" rx="2" fill="#78909c"/>
    <!-- PSI label at cabin -->
    <rect x="0" y="148" width="160" height="22" rx="4" fill="#01579b" opacity="0.9"/>
    <text x="80" y="163" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">10.8 PSI at tap</text>
  </g>

  <!-- Distribution labels inside cabin area -->
  <text x="1080" y="475" font-family="sans-serif" font-size="11" fill="#37474f" text-anchor="middle">kitchen · bathroom · wash station</text>

  <!-- Title box -->
  <rect x="30" y="25" width="340" height="68" rx="8" fill="#01579b" opacity="0.9"/>
  <text x="52" y="52" font-family="sans-serif" font-size="19" font-weight="700" fill="white">Gravity-Fed Water System</text>
  <text x="52" y="74" font-family="sans-serif" font-size="13" fill="#b3e5fc">No pump · No electricity · $398 build cost</text>

  <!-- PSI formula callout -->
  <rect x="30" y="530" width="260" height="48" rx="6" fill="#ffffff" opacity="0.85"/>
  <text x="50" y="552" font-family="monospace" font-size="14" fill="#01579b" font-weight="bold">28 ft ÷ 2.31 = 12.1 PSI</text>
  <text x="50" y="570" font-family="sans-serif" font-size="12" fill="#546e7a">calculated head pressure at floor</text>
</svg>
