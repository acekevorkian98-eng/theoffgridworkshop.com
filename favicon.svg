<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tree-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7C5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5A3D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Tree trunk -->
  <rect x="45" y="60" width="10" height="20" fill="#6B4423"/>
  <!-- Tree foliage - triangular Christmas tree shape -->
  <polygon points="50,20 25,50 75,50" fill="url(#tree-gradient)"/>
  <polygon points="50,35 30,60 70,60" fill="url(#tree-gradient)" opacity="0.9"/>
</svg>
